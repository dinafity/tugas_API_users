<!DOCTYPE html>
<html>
<head>
    <title>Tugas Web Dina - User & Map</title>
    <style>
        /* Gaya biar tampilannya rapi (CSS) */
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
        .user-item { 
            border: 1px solid #ccc; 
            margin-bottom: 15px; 
            padding: 15px; 
            border-radius: 8px;
            background-color: #f9f9f9;
            list-style: none;
        }
        .nama-user { font-weight: bold; font-size: 18px; color: #333; }
        .koordinat { color: #666; margin-bottom: 10px; }
        iframe { width: 100%; height: 200px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>Daftar Pengguna</h2>
    <button id="btnTampil">Tampilkan User dan Geo (lokasinya)</button>
    
    <ul id="daftar"></ul>

    <script>
        const tombol = document.getElementById('btnTampil');
        const listContainer = document.getElementById('daftar');

        tombol.addEventListener('click', function() {
            fetch('https://jsonplaceholder.typicode.com/users')
                .then(res => res.json())
                .then(data => {
                    listContainer.innerHTML = ''; // Kosongkan list

                    data.forEach(user => {
                        const lat = user.address.geo.lat;
                        const lng = user.address.geo.lng;

                        // Kita buat elemen list <li>
                        const li = document.createElement('li');
                        li.className = 'user-item';

                        // Isi HTML-nya (Nama: Lokasi + Peta)
                        li.innerHTML = `
                            <div class="nama-user">${user.name}:</div>
                            <div class="koordinat">Lokasi: ${lat}, ${lng}</div>
                            
                            <iframe 
                                src="https://maps.google.com/maps?q=${lat},${lng}&z=4&output=embed">
                            </iframe>
                        `;

                        listContainer.appendChild(li);
                    });
                })
                .catch(err => alert("Gagal ambil data!"));
        });
    </script>

</body>
</html>
